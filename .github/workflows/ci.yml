name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela ejecuciones antiguas de la misma rama/PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  #  Backend — FastAPI + pytest
  # ──────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Comprobar que existe backend/
        id: check
        run: echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install -e ".[dev]" || pip install -e .
          else
            echo "::warning::No se encontró requirements.txt ni pyproject.toml en backend/"
          fi
          pip install pytest

      - name: Lint (ruff, si está disponible)
        run: |
          if pip show ruff > /dev/null 2>&1; then
            ruff check . || exit 1
          else
            echo "ruff no instalado, se omite el lint"
          fi

      - name: Tests (pytest)
        run: pytest -q

  # ──────────────────────────────────────────────
  #  Frontends — build de React y Svelte (matriz)
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [frontend, frontend-alt]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ¿Existe ${{ matrix.dir }}/package.json?
        id: check
        run: |
          if [ -f "${{ matrix.dir }}/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${{ matrix.dir }} aún no tiene package.json; se omite."
          fi

      - name: Setup Node
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Instalar dependencias
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint (si existe el script)
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.dir }}
        run: npm run lint --if-present

      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.dir }}
        run: npm run build --if-present

      - name: Tests (si existen)
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.dir }}
        run: npm test --if-present
