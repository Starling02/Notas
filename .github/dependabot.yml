version: 2
updates:
  # ── Backend (Python / pip) ──
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # ── Frontend A (React + Vite) ──
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # ── Frontend B (Svelte + Vite) ──
  - package-ecosystem: npm
    directory: /frontend-alt
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend-alt"]
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # ── GitHub Actions ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"
